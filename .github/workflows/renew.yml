name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb netcat-openbsd
        npm install
        npx playwright install-deps chrome

    - name: Restore proxy cooldown cache
      uses: actions/cache@v4
      with:
        path: proxy-cooldown.json
        key: katabump-proxy-cooldown-${{ github.run_id }}
        restore-keys: |
          katabump-proxy-cooldown-

    - name: Download proxy list
      env:
        WEBSHARE_PROXY_LIST_URL: ${{ secrets.WEBSHARE_PROXY_LIST_URL }}
      run: |
        if [ -n "$WEBSHARE_PROXY_LIST_URL" ]; then
          echo "Downloading Webshare proxy list..."
          curl -fsSL "${WEBSHARE_PROXY_LIST_URL}" -o proxies.txt
          echo "Proxy list downloaded. Lines: $(wc -l < proxies.txt)"
        else
          echo "WEBSHARE_PROXY_LIST_URL is empty, running without Webshare proxy."
        fi

    - name: Run proxy runner (with up to 5 proxy switches)
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node proxy_runner.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/

    - name: Save proxy cooldown cache
      if: always()
      uses: actions/cache@v4
      with:
        path: proxy-cooldown.json
        key: katabump-proxy-cooldown-${{ github.run_id }}
